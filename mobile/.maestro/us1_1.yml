appId: com.flightcrew.mobile
tags:
  - us1
---
- runFlow: flows/open_map.yml

# Test 1: Dual Campus Availability - starts on SGW campus
- assertVisible:
    text: "Next campus"
    enabled: false
- assertVisible:
    text: "Previous campus"
    enabled: true
- assertVisible: "SGW Campus"

# Navigate to Loyola campus
- tapOn: "Previous campus"
- waitForAnimationToEnd
- assertVisible: "Loyola Campus"

# Navigate back to SGW campus
- tapOn: "Next campus"
- waitForAnimationToEnd
- assertVisible:
    text: "Next campus"
    enabled: false
- assertVisible:
    text: "Previous campus"
    enabled: true
- assertVisible: "SGW Campus"
