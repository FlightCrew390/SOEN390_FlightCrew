server:
  port: 9090

external:
  api:
    url: "https://opendata.concordia.ca/API/v1"
    key: "${EXTERNAL_API_KEY}"
    user: "${EXTERNAL_API_USER}"

google:
  api:
    # Optional: set GOOGLE_API_KEY in env or .env for geocoding; app starts without it for building list.
    key: "${GOOGLE_API_KEY:}"
