appId: com.flightcrew.mobile
tags:
  - us5
---
- runFlow: flows/open_map.yml

# ═══════════════════════════════════════════════════════════════════
# US5.2 – POI Display, Detailed Information & Directions
# ═══════════════════════════════════════════════════════════════════

# ── Test 2a: POI Filtering and Display – search for nearby restaurants ──
- tapOn: "Search campus buildings"
- waitForAnimationToEnd

# Select Restaurant category
- tapOn: "Select location type"
- waitForAnimationToEnd
- tapOn: "Restaurant"
- waitForAnimationToEnd

# Submit search with no distance limit
- tapOn: "Search"
- waitForAnimationToEnd

# Results panel should appear with POI listings
- extendedWaitUntil:
    visible:
      id: "poi-results-panel"
    timeout: 15000

# ── Test 2b: POI Detailed Information – select a POI to view on map ──
# Tap the map-pin icon on the first result to show it on the map
- tapOn: "Show .* on map"
- waitForAnimationToEnd

# POI marker should appear on the map
- assertVisible:
    id: "poi-marker"

# ── Test 2c: Direction Generation – get directions to the selected POI ──
# Tap the POI marker to open the directions panel
- tapOn:
    id: "poi-marker"
- waitForAnimationToEnd

# Directions panel should open
- assertVisible: "Directions"

# ── Test 2d: Select a travel mode to generate the route ──
- tapOn: "Get directions by Walk"
- extendedWaitUntil:
    visible: "View step-by-step directions"
    timeout: 15000

# ── Test 2e: Close directions and verify alternative flow via directions button ──
- tapOn: "Close direction panel"
- waitForAnimationToEnd

# Re-open search and search for cafes
- tapOn: "Search campus buildings"
- waitForAnimationToEnd
- tapOn: "Select location type"
- waitForAnimationToEnd
- tapOn: "Cafe"
- waitForAnimationToEnd

- tapOn: "Search"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "poi-results-panel"
    timeout: 15000

# ── Test 2f: Use the directions button directly from the results list ──
- tapOn: "Get directions to .*"
- waitForAnimationToEnd

# Directions panel should open for the selected POI
- assertVisible: "Directions"

# Select transit mode to verify route generation works for POIs
- tapOn: "Get directions by Transit"
- extendedWaitUntil:
    visible: "View step-by-step directions"
    timeout: 15000
