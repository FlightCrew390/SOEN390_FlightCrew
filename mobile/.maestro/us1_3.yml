appId: com.flightcrew.mobile
tags:
  - us1
---
- runFlow: flows/open_map.yml

# Test 3a: UI Visibility - toggle is visible before any interaction
- assertVisible: "Previous campus"
- assertVisible: "Next campus"
- assertVisible: "SGW Campus"

# Test 3b: Transition Performance - switch campuses and assert label updates
- tapOn: "Previous campus"
- waitForAnimationToEnd
- assertVisible: "Loyola Campus"

# Test 3c: State Persistence - pan map and verify campus label and toggle remain
- swipe:
    start: 55%, 55%
    end: 25%, 70%
- assertVisible: "Loyola Campus"
- assertVisible: "Previous campus"
- assertVisible: "Next campus"

# Switch back to SGW
- tapOn: "Next campus"
- waitForAnimationToEnd
- assertVisible: "SGW Campus"

# Pan map on SGW and verify state persists
- swipe:
    start: 60%, 50%
    end: 80%, 60%
- assertVisible: "SGW Campus"
- assertVisible: "Previous campus"
- assertVisible: "Next campus"
