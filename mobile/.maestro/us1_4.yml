appId: com.flightcrew.mobile
tags:
  - us1
---
- runFlow: flows/open_map.yml

# Test 4a: Location Services Integration
# Recenter button only renders when location is available — its presence
# confirms the app has connected to the device GPS provider
- assertVisible: "Recenter map on my location"

# Test 4b: Recenter Map Functionality
# Center map on current location first
- tapOn: "Recenter map on my location"

# Pan map away so current location leaves the viewport
- swipe:
    start: 50%, 50%
    end: 90%, 10%
- swipe:
    start: 90%, 10%
    end: 10%, 90%

# Recenter button must still be anchored to the UI
- assertVisible: "Recenter map on my location"

# Tap recenter and verify smooth transition completes
- tapOn: "Recenter map on my location"

# Location is back in view — recenter button remains available
- assertVisible: "Recenter map on my location"
