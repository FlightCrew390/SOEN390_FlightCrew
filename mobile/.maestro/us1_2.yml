appId: com.flightcrew.mobile
tags:
  - us1
---
- runFlow: flows/open_map.yml

# Test 2: Building Distinction - verify buildings are rendered on SGW campus
# (Google Maps visual distinction cannot be asserted via accessibility labels;
#  we verify the building data loads for both campuses)
- assertNotVisible: "Loading buildings..."
- assertVisible: "SGW Campus Selector"

# Navigate to Loyola campus and verify buildings also load
- tapOn: "Loyola Campus selector"
- assertVisible:
    id: "campus-selector-loyola-active"
- assertNotVisible: "Loading buildings..."

# Navigate back to SGW and confirm buildings still rendered
- tapOn: "SGW Campus selector"
- assertVisible:
    id: "campus-selector-sgw-active"
- assertNotVisible: "Loading buildings..."
